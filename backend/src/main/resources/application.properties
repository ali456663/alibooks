server.port=${SERVER_PORT:3000}
jwt.secret=${JWT_SECRET:change_me_in_production}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cloudshop}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:cloudshop}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:cloudshop}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}
app.time-zone=${APP_TIME_ZONE:Europe/Stockholm}
app.invoice-reminders.cron=${APP_INVOICE_REMINDERS_CRON:0 0 9 * * *}
stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}

ai.gemini.api-key=${GEMINI_API_KEY:}
ai.gemini.model=${GEMINI_MODEL:gemini-3.5-flash}
ai.gemini.base-url=${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
ai.huggingface.token=${HF_TOKEN:}
ai.huggingface.model=${HF_MODEL:moonshotai/Kimi-K2-Instruct-0905}
ai.huggingface.base-url=${HF_BASE_URL:https://router.huggingface.co/v1}

spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}
