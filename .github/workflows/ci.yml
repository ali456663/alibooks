name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    name: Backend build and test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cloudshop
          POSTGRES_PASSWORD: cloudshop
          POSTGRES_DB: cloudshop
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cloudshop -d cloudshop"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/cloudshop
      SPRING_DATASOURCE_USERNAME: cloudshop
      SPRING_DATASOURCE_PASSWORD: cloudshop
      JWT_SECRET: ci_test_secret_must_be_long_enough_for_demo
      APP_FRONTEND_URL: http://localhost:5173
      STRIPE_SECRET_KEY: ""
      STRIPE_WEBHOOK_SECRET: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Test backend
        working-directory: backend
        run: mvn test

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t cloudshop-backend:ci ./backend

      - name: Build frontend image
        run: docker build -t cloudshop-frontend:ci ./frontend
